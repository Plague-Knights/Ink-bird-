<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ink Bird Arcade</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrap">
    <h1>Ink Bird Arcade</h1>
    <p class="tag">0.001 ETH on Ink for 100 tries. 90% to the weekly prize pool.</p>

    <div class="arcade-bar">
      <button id="connectWallet" type="button">Connect Wallet</button>
      <span class="arcade-info">
        <span id="walletAddress" class="muted">not connected</span>
        <span class="sep">·</span>
        <span>Credits: <strong id="creditBalance">0</strong></span>
        <span class="sep">·</span>
        <span>Week <strong id="weekId">—</strong> pool: <strong id="poolAmount">0</strong> ETH</span>
      </span>
      <button id="buyEntry" type="button" disabled>Pay 0.001 ETH · +100</button>
      <button id="startRun" type="button" disabled>Start Run</button>
    </div>

    <div class="stage">
      <canvas id="game" width="480" height="640"></canvas>
      <aside class="board">
        <h2>Weekly Top 10</h2>
        <ol id="leaderboard" class="leaderboard"></ol>
        <button id="refreshBoard" class="clear" type="button">Refresh</button>
      </aside>
    </div>
    <div class="hud">
      <div>Score: <span id="score">0</span></div>
      <div>Best: <span id="best">0</span></div>
    </div>
    <p class="hint">Click / Tap / Space to flap. R to restart. Paid runs require a connected wallet and one credit.</p>
  </div>

  <!-- Configure these two before opening the page:
       data-arcade  = deployed contract address
       data-backend = backend base URL (e.g. https://arcade.example.com) -->
  <script
    type="module"
    src="arcade.js"
    data-arcade="0x0000000000000000000000000000000000000000"
    data-backend="http://localhost:8787"
  ></script>
  <script src="wallet-ui.js" defer></script>
  <script src="game.js" defer></script>
</body>
</html>
