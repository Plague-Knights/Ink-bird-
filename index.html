<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ink Squid</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrap">
    <div class="stage">
      <div class="game-col">
        <h1>Ink Squid</h1>
        <div class="canvas-wrap">
          <canvas id="game" width="480" height="640"></canvas>

          <div id="menuScreen" class="screen">
            <div class="screen-inner">
              <h2>INK SQUID</h2>
              <p class="subtitle">Swim through the reef. Collect ink droplets.</p>
              <button id="playBtn" class="big-btn" type="button">PLAY</button>
              <p class="hint">Space / Tap / Click to swim</p>
            </div>
          </div>

          <div id="deadScreen" class="screen hidden">
            <div class="screen-inner card">
              <h2 class="danger">CAUGHT!</h2>
              <div class="stats">
                <div class="stat"><span>Ink</span><b id="deadScore">0</b></div>
                <div class="stat"><span>Best</span><b id="deadBest">0</b></div>
              </div>
              <div id="deadMedal" class="medal hidden"></div>
              <button id="retryBtn" class="big-btn" type="button">PLAY AGAIN</button>
            </div>
          </div>

          <div id="pauseScreen" class="screen hidden">
            <div class="screen-inner">
              <h2>PAUSED</h2>
              <button id="resumeBtn" class="big-btn" type="button">RESUME</button>
            </div>
          </div>
        </div>
        <div class="hud">
          <div>Score: <span id="score">0</span></div>
          <div>Best: <span id="best">0</span></div>
          <button id="pauseBtn" class="icon-btn" type="button" title="Pause (P)">PAUSE</button>
        </div>
      </div>
      <aside class="board">
        <h2>Top 10</h2>
        <ol id="leaderboard" class="leaderboard"></ol>
        <button id="clearBoard" class="clear" type="button">Clear</button>
      </aside>
    </div>
  </div>

  <div id="entryModal" class="modal hidden" aria-hidden="true">
    <div class="modal-card">
      <h3>New high score!</h3>
      <p>Your score: <span id="entryScore">0</span></p>
      <label for="initials">Initials (3 letters)</label>
      <input id="initials" maxlength="3" autocomplete="off" spellcheck="false" />
      <div class="modal-actions">
        <button id="saveInitials" type="button">Save</button>
        <button id="skipInitials" type="button" class="ghost">Skip</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
